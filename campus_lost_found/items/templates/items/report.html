{% extends 'items/base.html' %}

{% block content %}
<style>
    /* We add select and textarea to style the dropdowns and description boxes */
    form input, form select, form textarea {
        width: 100%;
        padding: 0.75rem 1rem;
        margin-top: 0.5rem;
        margin-bottom: 1.5rem;
        background-color: #212529;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 0.375rem;
        color: white;
    }
    form input[type="file"] { padding: 0.5rem; }
    form input:focus, form select:focus, form textarea:focus {
        outline: none;
        border-color: var(--neon-accent);
        box-shadow: 0 0 0 0.25rem rgba(0, 210, 137, 0.25);
    }
    form label { font-weight: 600; color: #ccc; }
    .helptext { font-size: 0.85rem; color: #6c757d; display: block; margin-top: -1rem; margin-bottom: 1rem; }
</style>

<div class="row justify-content-center py-4 mb-5">
    <div class="col-md-8 col-lg-6">
        <a href="{% url 'home' %}" class="btn btn-outline-secondary rounded-pill mb-4" style="color: #aaa;">
            &larr; Back to Main Feed
        </a>
        
        <div class="card bg-dark border-secondary border-opacity-25 shadow-lg">
            <div class="card-body p-4 p-md-5">
                <h2 class="fw-bold text-white mb-1">Report an Item</h2>
                <p class="text-secondary mb-4">Provide as much detail as possible to help identify the item.</p>
                
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <hr class="border-secondary my-4">
                    <button type="submit" class="btn btn-neon w-100 py-3 fs-5">Submit Report</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
