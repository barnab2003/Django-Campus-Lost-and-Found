<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Report Item</title>
</head>
<body>
    <div style="max-width: 500px; margin: auto; padding: 20px;">
        <h2>Report a Lost or Found Item</h2>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" style="padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px;">Submit Report</button>
        </form>
        <br>
        <a href="{% url 'home' %}">Back to Home</a>
    </div>
</body>
</html>
