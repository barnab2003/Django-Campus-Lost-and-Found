<!-- items/templates/items/base.html -->
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark"> <!-- This forces Bootstrap's sleek dark mode -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Campus Lost & Found</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts (Inter matches the reference image well) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212; /* Deep dark background */
        }
        
        /* Custom Neon Theme Colors */
        :root {
            --neon-accent: #00d289; /* The green/teal from your image */
        }

        /* Styling the Primary Button (Like "Get Started") */
        .btn-neon {
            background-color: var(--neon-accent);
            color: #000;
            font-weight: 600;
            border-radius: 50px;
            padding: 10px 24px;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-neon:hover {
            background-color: #00eb99;
            transform: translateY(-2px);
        }

        /* Styling the Outline Button (Like "View Portfolio") */
        .btn-outline-neon {
            background-color: transparent;
            color: white;
            font-weight: 600;
            border-radius: 50px;
            padding: 10px 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        .btn-outline-neon:hover {
            border-color: var(--neon-accent);
            color: var(--neon-accent);
        }

        /* Navbar tweaks */
        .navbar { background-color: #0a0a0a !important; padding: 15px 0; }
        .navbar-brand { font-weight: 800; font-size: 1.5rem; }
        .nav-link { color: #aaa; }
        .nav-link:hover { color: var(--neon-accent); }
        
        /* Badge Tag Styling */
        .badge-tag {
            background-color: rgba(0, 210, 137, 0.1);
            color: var(--neon-accent);
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- Top Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-5">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">Spotlight<span style="color: var(--neon-accent);">.</span></a>
            
            <div class="d-flex align-items-center">
                {% if user.is_authenticated %}
                    <span class="text-light me-3 d-none d-md-block">Welcome, {{ user.username }}</span>
                    <a href="{% url 'my_dashboard' %}" class="nav-link me-3">My Dashboard</a>
                    <form method="post" action="{% url 'logout' %}" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-link text-danger text-decoration-none">Log Out</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="nav-link me-3">Log In</a>
                    <a href="{% url 'register' %}" class="btn btn-neon">Get Started</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Main Content Area where other pages will inject their code -->
    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Bootstrap JS for mobile menus, dropdowns, etc. -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
